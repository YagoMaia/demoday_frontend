name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessário para publicar no GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Só faz o push (upload para o registry) se não for um Pull Request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Configuração rigorosa de cache para não desperdiçar minutos de CI
          cache-from: type=gha
          cache-to: type=gha,mode=max
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository (com os playbooks do Ansible)
        uses: actions/checkout@v4

      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configurar chave SSH para o EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY2 }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Executar Ansible Playbook de Deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # Cria um inventário dinâmico simples no CI
          echo "[production]" > inventory.ini
          echo "${{ secrets.EC2_HOST2 }} ansible_user=${{ secrets.EC2_USERNAME }}" >> inventory.ini

          # Higieniza o nome do repositório para minúsculas (Exigência do Docker)
          # A variável nativa $GITHUB_REPOSITORY contém o nome "YagoMaia/demoday_frontend"
          REPO_LOWER=${GITHUB_REPOSITORY,,}

          # Executa o playbook injetando as credenciais e a tag da imagem
          ansible-playbook -i inventory.ini ansible/deploy-app.yml \
            -e "ghcr_user=${{ github.actor }}" \
            -e "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            -e "app_image=ghcr.io/${REPO_LOWER}:sha-${{ github.sha }}"
